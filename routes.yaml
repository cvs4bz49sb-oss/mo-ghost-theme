# Ghost routing for Mere Orthodoxy.
#
# Ghost treats routes.yaml as site config, not theme content, so it is
# NOT included in theme deploys (the GitHub Action zips exclude it).
# To apply this file: Ghost Admin -> Settings -> Labs -> Routes ->
# Upload routes file, then pick this file. Only needs to happen when
# routes change.

routes:
  /membership/:
    template: custom-membership
  /contributors/:
    template: custom-contributors
  /about/:
    template: custom-about
  /archive/:
    controller: channel
    template: custom-archive
    filter: status:published
  /give/:
    template: custom-gift
  /groups/:
    template: custom-groups
  /group-manage/:
    template: custom-group-manage
  /institutions/:
    template: custom-institutions
  /institution-manage/:
    template: custom-institution-manage
  /manage/:
    template: custom-manage
  /complete-membership/:
    template: custom-complete-membership
  /dashboard/:
    template: custom-dashboard
  /dashboard/bookmarks/:
    template: custom-dashboard-bookmarks
  /dashboard/history/:
    template: custom-dashboard-history
  /dashboard/replays/:
    template: custom-dashboard-replays
  /dashboard/ebooks/:
    template: custom-dashboard-ebooks
  /events/:
    template: custom-events
  /forum/:
    template: custom-forum
  /success/:
    template: custom-success
  /contact/:
    template: custom-contact
  /submissions/:
    template: custom-submissions
  /podcasts/mere-fidelity/:
    template: custom-mere-fidelity
  /podcasts/christians-reading-classics/:
    template: custom-christians-reading-classics
  /admin/:
    template: custom-admin
  /admin/members/:
    template: custom-admin-members
  /admin/members/addresses/:
    template: custom-admin-addresses
  /admin/members/gifts/:
    template: custom-admin-gifts
  /admin/members/groups/:
    template: custom-admin-groups
  /admin/members/institutions/:
    template: custom-admin-institutions
  /admin/members/drift/:
    template: custom-admin-drift
  /admin/traffic/:
    template: custom-admin-traffic
  /admin/editorial/:
    template: custom-admin-editorial
  # Ebook landing pages (public, lead-gen). Form on each comps a free
  # signup into the matching internal Ghost tier via mo-ebook-access.
  /ebook/navigating-the-fracture/:
    template: custom-ebook-navigating-the-fracture
  /ebook/spiritual-formation-for-the-family/:
    template: custom-ebook-spiritual-formation-for-the-family
  /ebook/blueprint-for-renewal/:
    template: custom-ebook-blueprint-for-renewal
  # Ebook read pages — bound to Ghost Pages (created in Ghost Admin)
  # whose visibility is set to [paid Member tier, per-ebook tier].
  # Ghost enforces the gate before the standalone template renders.
  /ebook/navigating-the-fracture/read/:
    template: page-ebook-navigating-the-fracture-read
    data: page.ebook-navigating-the-fracture-read
  /ebook/spiritual-formation-for-the-family/read/:
    template: page-ebook-spiritual-formation-for-the-family-read
    data: page.ebook-spiritual-formation-for-the-family-read
  /ebook/blueprint-for-renewal/read/:
    template: page-ebook-blueprint-for-renewal-read
    data: page.ebook-blueprint-for-renewal-read

collections:
  /:
    permalink: /{slug}/
    template: index
    # Exclude internal-tagged event posts from the default collection
    # so they don't leak onto /archive/, tag archives, or any default
    # {{#foreach posts}} iteration. They remain accessible by URL and
    # render via the events page / replay library.
    filter: tag:-hash-event

taxonomies:
  tag: /tag/{slug}/
  author: /author/{slug}/
