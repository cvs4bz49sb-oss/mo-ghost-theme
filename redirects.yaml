# Ghost URL redirects for Mere Orthodoxy.
#
# Ghost treats redirects.yaml as site config, not theme content, so it
# is NOT included in theme deploys (the GitHub Action zips exclude
# it). Upload once via Ghost Admin -> Settings -> Labs -> Redirects ->
# Upload redirects file. Re-upload only when redirects change.
#
# Format: each entry has `from` (regex), `to` (target), and optional
# `permanent: true` for 301 (default is 302).

- from: ^/tag/author-(.*)/?$
  to: /contributors/$1/
  permanent: true

- from: ^/author/(.*)/?$
  to: /contributors/$1/
  permanent: true
