# Ghost URL redirects for Mere Orthodoxy.
#
# Ghost treats redirects.yaml as site config, not theme content, so it
# is NOT included in theme deploys. Upload once via Ghost Admin ->
# Settings -> Labs -> Redirects -> Upload redirects file. Re-upload only
# when redirects change.

# Ghost's default /author/{slug}/ URLs aren't used by this theme —
# guest authors live as tags, not Ghost users. Send any stragglers to
# the tag-style contributor page.
- from: ^/author/(.*)/?$
  to: /tag/author-$1/
  permanent: true
